<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photography — Rohan Hejmadi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .photo-page {
            min-height: 100vh;
            background: #080c10;
            color: white;
            padding: 0 0 6rem;
            position: relative;
        }

        /* Grain only on background, not on images */
        .photo-page::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 128px 128px;
        }

        /* All content sits above the grain */
        .photo-header,
        .photo-section {
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .photo-header {
            padding: 3rem 7% 3rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .photo-header-left .eyebrow {
            color: rgba(255,255,255,0.45);
            margin: 0 0 0.5rem;
        }

        .photo-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1;
            letter-spacing: 0.03em;
            margin: 0;
            color: white;
        }

        .photo-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: color 0.3s ease, gap 0.3s ease;
            padding-bottom: 0.3rem;
        }

        .photo-back:hover { color: white; gap: 0.75rem; }

        .photo-back .back-arrow {
            font-size: 1rem;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .photo-back:hover .back-arrow { transform: translateX(-3px); }

        /* ── Section ── */
        .photo-section {
            padding: 4rem 7% 0;
        }

        .photo-section-header {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .photo-section-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            letter-spacing: 0.03em;
            margin: 0;
            color: white;
        }

        .photo-section-count {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        /* ── Grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 3px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 4/3;
            overflow: hidden;
            cursor: pointer;
            background: #1c2430;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
            opacity: 0.88;
        }

        .photo-item:hover img {
            transform: scale(1.04);
            opacity: 1;
        }

        .photo-item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: flex-end;
            padding: 1.25rem;
            transition: background 0.3s ease;
        }

        .photo-item:hover .photo-item-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 60%);
        }

        .photo-caption {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            color: white;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .photo-item:hover .photo-caption {
            opacity: 1;
            transform: translateY(0);
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            display: block;
            transform: scale(0.96);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .lightbox.active .lightbox-img { transform: scale(1); }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s ease;
            padding: 0;
        }

        .lightbox-close:hover { color: white; }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 1rem;
            transition: color 0.2s ease, opacity 0.2s ease;
            line-height: 1;
        }

        .lightbox-img-wrap {
            position: relative;
            display: inline-flex;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 0.3rem 0.6rem;
            background: rgba(0,0,0,0.65);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            color: rgba(255,255,255,0.85);
        }

        .lightbox-nav:hover { color: white; }
        .lightbox-nav.hidden { opacity: 0; pointer-events: none; }
        .lightbox-prev { left: 1.5rem; }
        .lightbox-next { right: 1.5rem; }

        .lightbox-section-label {
            position: absolute;
            top: 2rem;
            left: 2.5rem;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<button class="btn-report btn-report--bottom">Report Bug</button>

<div class="photo-page">

    <div class="photo-header">
        <div class="photo-header-left">
            <p class="eyebrow">Projects</p>
            <h1>Photography</h1>
        </div>
        <a href="projects.html" class="photo-back">
            <span class="back-arrow">&#8592;</span>
            <span>Back</span>
        </a>
    </div>

    <!--
    ═══════════════════════════════════════════════
    TO ADD A NEW SECTION (e.g. Japan, Iceland):
    Copy the entire .photo-section block below,
    change the <h2> title, and add your photos.
    ═══════════════════════════════════════════════
    -->

    <!-- ── Alaska ── -->
    <div class="photo-section" id="alaska">
        <div class="photo-section-header">
            <h2>Alaska</h2>
            <span class="photo-section-count" data-section="alaska"></span>
        </div>

        <div class="photo-grid" data-section-grid="alaska">
            <!--
            TO ADD A PHOTO to this section:
            <div class="photo-item" onclick="openLightbox(this, 'alaska')">
                <img src="your-photo.jpg" alt="Caption">
                <div class="photo-item-overlay">
                    <span class="photo-caption">Caption</span>
                </div>
            </div>
            -->
            <div class="photo-item" onclick="openLightbox(this, 'alaska')">
                <img src="Alaska/20210715_192948347_iOS.jpeg" alt="McHugh Creek">
                <div class="photo-item-overlay">
                    <span class="photo-caption">McHugh Creek</span>
                </div>
            </div>
            <div class="photo-item" onclick="openLightbox(this, 'alaska')">
                <img src="Alaska/20210715_194249705_iOS.jpeg" alt="Turnagain Arm">
                <div class="photo-item-overlay">
                    <span class="photo-caption">Turnagain Arm</span>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
    <span class="lightbox-section-label" id="lightbox-section"></span>
    <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" onclick="navigateLightbox(-1)">&#8592;</button>
    <div class="lightbox-img-wrap">
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
        <span class="lightbox-caption" id="lightbox-caption"></span>
    </div>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" onclick="navigateLightbox(1)">&#8594;</button>
</div>

<script>
    let currentIndex = 0;
    let currentItems = [];
    let currentSection = '';

    // Update per-section photo counts
    document.querySelectorAll('[data-section-grid]').forEach(grid => {
        const section = grid.dataset.sectionGrid;
        const count = grid.querySelectorAll('.photo-item img').length;
        const label = document.querySelector(`[data-section="${section}"]`);
        if (label && count > 0) {
            label.textContent = count + ' ' + (count === 1 ? 'photo' : 'photos');
        }
    });

    function updateNavArrows() {
        document.getElementById('lightbox-prev').classList.toggle('hidden', currentIndex === 0);
        document.getElementById('lightbox-next').classList.toggle('hidden', currentIndex === currentItems.length - 1);
    }

    function openLightbox(el, section) {
        const img = el.querySelector('img');
        const grid = document.querySelector(`[data-section-grid="${section}"]`);
        currentItems = Array.from(grid.querySelectorAll('.photo-item img'));
        currentIndex = currentItems.indexOf(img);
        currentSection = section;
        showImage(currentIndex);
        document.getElementById('lightbox-section').textContent = section;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function showImage(index) {
        const img = currentItems[index];
        document.getElementById('lightbox-img').src = img.src;
        document.getElementById('lightbox-img').alt = img.alt;
        document.getElementById('lightbox-caption').textContent = img.alt || '';
        updateNavArrows();
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    function closeLightboxOnBg(e) {
        if (e.target === document.getElementById('lightbox')) closeLightbox();
    }

    function navigateLightbox(dir) {
        currentIndex = currentIndex + dir;
        showImage(currentIndex);
    }

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft' && currentIndex > 0) navigateLightbox(-1);
        if (e.key === 'ArrowRight' && currentIndex < currentItems.length - 1) navigateLightbox(1);
    });
</script>

<script src="report-bug.js"></script>
</body>
</html>
