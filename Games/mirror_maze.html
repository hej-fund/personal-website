<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirror Maze</title>
    <link rel="icon" href="mirror_maze_favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #080a12; }

        /* ── Report Bug button ── */
        .btn-report {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            padding: 0.625rem 1.25rem;
            background: #ff2020;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 0.825rem;
            letter-spacing: 0.03em;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        .btn-report::after {
            content: "→";
            position: absolute;
            right: 1rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: white;
        }
        .btn-report:hover { background: #e00000; padding-right: 2rem; }
        .btn-report:hover::after { opacity: 1; transform: translateX(0); }

        /* ── Bug modal ── */
        .bug-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .bug-modal-overlay.active { display: flex; }
        .bug-modal {
            position: relative;
            background: #0f1419;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 460px;
            margin: 1rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }
        .bug-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .bug-modal-close:hover { color: white; }
        .bug-modal-eyebrow {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin: 0 0 0.6rem;
        }
        .bug-modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2rem;
            letter-spacing: 0.02em;
            color: white;
            margin: 0 0 1.75rem;
        }
        .bug-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .bug-form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .bug-form-group label {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }
        .bug-form-group input,
        .bug-form-group textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 0.65rem 0.9rem;
            color: white;
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            resize: vertical;
            transition: border-color 0.2s ease;
            outline: none;
        }
        .bug-form-group input::placeholder,
        .bug-form-group textarea::placeholder { color: rgba(255,255,255,0.25); }
        .bug-form-group input:focus,
        .bug-form-group textarea:focus { border-color: rgba(255,255,255,0.35); }
        .bug-form-group input.field-error,
        .bug-form-group textarea.field-error { border-color: #ff2020; }
        .bug-form-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.25rem;
        }
        .btn-submit-bug {
            padding: 0.625rem 1.25rem;
            background: #ff2020;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 0.825rem;
            letter-spacing: 0.03em;
            transition: background 0.3s ease;
        }
        .btn-submit-bug:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-submit-bug:not(:disabled):hover { background: #e00000; }
        .btn-clear-bug {
            padding: 0.625rem 1.25rem;
            background: #b8860b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            font-size: 0.825rem;
            letter-spacing: 0.03em;
            transition: background 0.3s ease;
        }
        .btn-clear-bug:hover { background: #9a7009; }
        .bug-form-status {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            font-size: 0.85rem;
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            display: none;
        }
        .bug-form-status.success {
            display: block;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            border: 1px solid rgba(46,204,113,0.3);
        }
        .bug-form-status.error {
            display: block;
            background: rgba(231,76,60,0.15);
            color: #ff2020;
            border: 1px solid rgba(231,76,60,0.3);
        }
    </style>
</head>
<body>
<button class="btn-report">Report Bug</button>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
        const { useState, useMemo, useEffect, useCallback } = React;

        function BackBtn({ href, onClick, label }) {
          const [hov, setHov] = React.useState(false);
          const s = {
            wrap: { display: "inline-flex", alignItems: "center", gap: hov ? "0.75rem" : "0.5rem", color: hov ? "white" : "rgba(255,255,255,0.75)", textDecoration: "none", fontFamily: "'Jost', sans-serif", fontWeight: 300, fontSize: "0.75rem", letterSpacing: "0.2em", textTransform: "uppercase", transition: "color 0.3s ease, gap 0.3s ease", cursor: "pointer", background: "none", border: "none", padding: 0 },
            arrow: { fontSize: "1rem", display: "inline-block", transform: hov ? "translateX(-3px)" : "translateX(0)", transition: "transform 0.3s ease", verticalAlign: "middle", position: "relative", top: "-1px" },
          };
          if (href) return <a href={href} style={s.wrap} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}><span style={s.arrow}>&#8592;</span><span>{label}</span></a>;
          return <button style={s.wrap} onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}><span style={s.arrow}>&#8592;</span><span>{label}</span></button>;
        }

        function HomeScreen({ onPlay, maxUnlocked }) {
          return (
            <div style={SH.root}>
              <style>{CSS}</style>
              <div style={SH.topBar}>
                <BackBtn href="../games.html" label="Back" />
              </div>
              <div style={SH.center}>
                <div className="fu" style={SH.head}>
                  <svg width="40" height="40" viewBox="20 20 260 260" xmlns="http://www.w3.org/2000/svg" style={{ marginRight: 10 }}>
                    <defs>
                      <linearGradient id="greenGlowH" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#00ff9c"/>
                        <stop offset="50%" stopColor="#00c853"/>
                        <stop offset="100%" stopColor="#b2ff59"/>
                      </linearGradient>
                      <filter id="softGlowH">
                        <feGaussianBlur stdDeviation="2.5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="redGlowH" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="blueGlowH" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="orangeGlowH" filterUnits="userSpaceOnUse" x="125" y="0" width="50" height="300">
                        <feGaussianBlur stdDeviation="6" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                    </defs>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="20" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.12"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="20" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.12"/>
                    <path d="M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120 L140 60 L180 60 L180 140 L100 140 L100 200 L160 200 L160 240 L60 240 L60 180 L120 180 L120 160 L80 160" stroke="url(#greenGlowH)" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#softGlowH)"/>
                    <g transform="translate(300,0) scale(-1,1)">
                      <path d="M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120 L140 60 L180 60 L180 140 L100 140 L100 200 L160 200 L160 240 L60 240 L60 180 L120 180 L120 160 L80 160" stroke="url(#greenGlowH)" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#softGlowH)"/>
                    </g>
                    <line x1="150" y1="30" x2="150" y2="270" stroke="#ff6a00" strokeWidth="5" strokeDasharray="14,8" opacity="1" filter="url(#orangeGlowH)"/>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.25"/>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#redGlowH)" opacity="0.9"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.25"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#blueGlowH)" opacity="0.9"/>
                  </svg>
                  <h1 style={SH.title}>MIRROR MAZE</h1>
                </div>
                <div className="fu d1" style={SH.grid}>
                  {LEVELS.map((lv, idx) => {
                    const locked = idx > maxUnlocked;
                    return (
                      <div style={{ ...SH.card, ...(locked ? { opacity: 0.55, cursor: "default" } : {}) }}
                        className={locked ? "" : "br"} key={idx} onClick={() => !locked && onPlay(idx)}>
                        <span style={{ ...SH.cardLbl, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, lineHeight: 1 }}>
                          LEVEL {idx + 1}
                          {locked && (
                            <svg width="13" height="15" viewBox="0 0 13 15" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: "block" , position: "relative", top: -2 }}>
                              <rect x="1.5" y="6.5" width="10" height="8" rx="1.5" stroke="rgba(0,255,100,.7)" strokeWidth="1.5"/>
                              <path d="M3.5 6.5V4.5a3 3 0 016 0v2" stroke="rgba(0,255,100,.7)" strokeWidth="1.5" strokeLinecap="round"/>
                              <rect x="5.5" y="9.5" width="2" height="2" rx="1" fill="rgba(0,255,100,.7)"/>
                            </svg>
                          )}
                        </span>
                        <span style={SH.cardSub}>{lv.name}</span>
                        <span style={SH.cardMeta}>{lv.sources.length} beam{lv.sources.length > 1 ? "s" : ""} &nbsp;·&nbsp; {lv.maxMirrors} mirrors</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        const SH = {
          root: { minHeight: "100vh", background: "linear-gradient(168deg,#080a12 0%,#0c0f1c 50%,#0e1225 100%)", display: "flex", flexDirection: "column", alignItems: "center", fontFamily: "'Oxanium',sans-serif", color: "#dde4ec", position: "relative" },
          topBar: { position: "absolute", top: "2.2rem", left: "2.5rem" },
          center: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, padding: "6rem 16px 40px" },
          head: { display: "flex", alignItems: "center", marginBottom: 32 },
          title: { margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: 7, color: "#e4ecf4" },
          grid: { display: "flex", flexDirection: "column", gap: 12, width: "100%", maxWidth: 420 },
          card: { padding: "20px 24px", borderRadius: 12, border: "1px solid rgba(0,255,100,.18)", background: "rgba(0,255,100,.04)", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6 },
          cardLbl: { fontSize: 18, fontWeight: 600, letterSpacing: 1, color: "rgba(0,255,100,.85)", fontFamily: "'Oxanium',sans-serif", textAlign: "center" },
          cardSub: { fontSize: 12, color: "rgba(0,255,100,.55)", letterSpacing: 1.5, fontFamily: "'Jost',sans-serif", fontWeight: 300, textAlign: "center" },
          cardMeta: { fontSize: 10, color: "rgba(190,200,215,.25)", letterSpacing: 1, fontFamily: "'IBM Plex Mono',monospace", textAlign: "center" },
        };

        const GRID = 8;
        const CELL = 44;
        const PAD = 15;

        const DELTA = { up: [-1, 0], down: [1, 0], left: [0, -1], right: [0, 1] };
        const REFLECT = {
          "/":  { right: "up", left: "down", up: "right", down: "left" },
          "\\": { right: "down", left: "up", up: "left", down: "right" },
        };

        const PALETTE = {
          red:   { beam: "#ff2d55", glow: "#ff2d5560" },
          blue:  { beam: "#0af",    glow: "#00aaff60" },
          green: { beam: "#00ff9c", glow: "#00ff9c60" },
        };

        const LEVELS = [
          {
            name: "First Light",
            hint: "Guide each beam to its matching target",
            maxMirrors: 4,
            sources: [
              { row: 1, col: -1, dir: "right", color: "red" },
              { row: -1, col: 6, dir: "down",  color: "blue" },
            ],
            targets: [
              { row: 6, col: 6, color: "red" },
              { row: 6, col: 1, color: "blue" },
            ],
            walls: [
              { row: 3, col: 3 },
              { row: 4, col: 6 },
            ],
          },
          {
            name: "Crossfire",
            hint: "Three beams — find where they converge",
            maxMirrors: 4,
            sources: [
              { row: 2, col: -1, dir: "right", color: "red"   },
              { row: -1, col: 7, dir: "down",  color: "blue"  },
              { row: 8,  col: 3, dir: "up",    color: "green" },
            ],
            targets: [
              { row: 6, col: 0, color: "red"   },
              { row: 0, col: 1, color: "blue"  },
              { row: 4, col: 7, color: "green" },
            ],
            walls: [
              { row: 4, col: 0 },
              { row: 0, col: 5 },
              { row: 1, col: 4 },
              { row: 5, col: 4 },
              { row: 7, col: 1 },
            ],
          },
        ];

        const kk = (r, c) => `${r},${c}`;
        const px = (col) => col * CELL + CELL / 2 + PAD;
        const py = (row) => row * CELL + CELL / 2 + PAD;

        function traceBeam(src, mirrors, walls, targets) {
          const wallSet = new Set(walls.map((w) => kk(w.row, w.col)));
          const tgtMap = Object.fromEntries(targets.map((t) => [kk(t.row, t.col), t]));
          const pts = [{ x: px(src.col), y: py(src.row) }];
          let dir = src.dir;
          let [dr, dc] = DELTA[dir];
          let r = src.row + dr;
          let c = src.col + dc;
          const visited = new Set();
          const hits = [];
          for (let i = 0; i < 200; i++) {
            if (r < 0 || r >= GRID || c < 0 || c >= GRID) { pts.push({ x: px(c), y: py(r) }); break; }
            const vk = `${r},${c},${dir}`;
            if (visited.has(vk)) break;
            visited.add(vk);
            if (wallSet.has(kk(r, c))) {
              pts.push({ x: px(c) - (DELTA[dir][1] * CELL) / 2, y: py(r) - (DELTA[dir][0] * CELL) / 2 });
              break;
            }
            if (tgtMap[kk(r, c)]) hits.push(tgtMap[kk(r, c)]);
            const m = mirrors[kk(r, c)];
            if (m) { pts.push({ x: px(c), y: py(r) }); dir = REFLECT[m][dir]; }
            [dr, dc] = DELTA[dir];
            r += dr; c += dc;
          }
          return { pts, hits, color: src.color };
        }

        function MirrorMaze({ onBack, onNext, onComplete, levelIndex }) {
          const level = LEVELS[levelIndex];
          const [mirrors, setMirrors] = useState({});
          const [won, setWon] = useState(false);
          const [showWin, setShowWin] = useState(false);
          const [showHelp, setShowHelp] = useState(levelIndex === 0);
          const [started, setStarted] = useState(levelIndex !== 0);

          useEffect(() => {
            document.body.style.margin = "0";
            document.body.style.overflow = "auto";
          }, []);

          const wallSet  = useMemo(() => new Set(level.walls.map((w) => kk(w.row, w.col))), [level]);
          const tgtSet   = useMemo(() => new Set(level.targets.map((t) => kk(t.row, t.col))), [level]);
          const entrySet = useMemo(() => {
            const s = new Set();
            level.sources.forEach((src) => { const [dr, dc] = DELTA[src.dir]; s.add(kk(src.row + dr, src.col + dc)); });
            return s;
          }, [level]);

          const beams = useMemo(() => level.sources.map((s) => traceBeam(s, mirrors, level.walls, level.targets)), [mirrors, level]);

          const litSet = useMemo(() => {
            const s = new Set();
            beams.forEach((b) => b.hits.forEach((h) => { if (h.color === b.color) s.add(kk(h.row, h.col)); }));
            return s;
          }, [beams]);

          const solved = litSet.size === level.targets.length;

          useEffect(() => { if (solved && !won) { setWon(true); onComplete && onComplete(); setTimeout(() => setShowWin(true), 400); } }, [solved, won]);

          const click = useCallback((r, c) => {
            if (won) return;
            const id = kk(r, c);
            if (wallSet.has(id) || tgtSet.has(id)) return;
            setMirrors((prev) => {
              const n = { ...prev };
              if (!n[id]) {
                if (Object.keys(n).length >= level.maxMirrors) return prev;
                n[id] = "/";
              } else if (n[id] === "/") n[id] = "\\";
              else delete n[id];
              return n;
            });
          }, [won, wallSet, tgtSet]);

          const reset = () => { setMirrors({}); setWon(false); setShowWin(false); };

          const W = GRID * CELL + PAD * 2;
          const mc = Object.keys(mirrors).length;

          return (
            <div style={S.root}>
              <style>{CSS}</style>
              <div style={{ position: "absolute", top: "2.2rem", left: "2.5rem" }}>
                <BackBtn onClick={onBack} label="Back" />
              </div>
              <div className="fu" style={S.head}>
                <div style={S.logoRow}>
                  <svg width="40" height="40" viewBox="20 20 260 260" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                      <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#00ff9c"/>
                        <stop offset="50%" stopColor="#00c853"/>
                        <stop offset="100%" stopColor="#b2ff59"/>
                      </linearGradient>
                      <filter id="softGlow">
                        <feGaussianBlur stdDeviation="2.5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
                        <feGaussianBlur stdDeviation="5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                      <filter id="orangeGlow" filterUnits="userSpaceOnUse" x="125" y="0" width="50" height="300">
                        <feGaussianBlur stdDeviation="6" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                      </filter>
                    </defs>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="20" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.12"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="20" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.12"/>
                    <path d="M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120 L140 60 L180 60 L180 140 L100 140 L100 200 L160 200 L160 240 L60 240 L60 180 L120 180 L120 160 L80 160" stroke="url(#greenGlow)" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#softGlow)"/>
                    <g transform="translate(300,0) scale(-1,1)">
                      <path d="M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120 L140 60 L180 60 L180 140 L100 140 L100 200 L160 200 L160 240 L60 240 L60 180 L120 180 L120 160 L80 160" stroke="url(#greenGlow)" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#softGlow)"/>
                    </g>
                    <line x1="150" y1="30" x2="150" y2="270" stroke="#ff6a00" strokeWidth="5" strokeDasharray="14,8" opacity="1" filter="url(#orangeGlow)"/>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.25"/>
                    <path d="M40 200 L100 140 L180 220 L260 140" stroke="#ff2d55" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#redGlow)" opacity="0.9"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="9" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.25"/>
                    <path d="M260 200 L200 140 L120 220 L40 140" stroke="#00aaff" strokeWidth="4" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#blueGlow)" opacity="0.9"/>
                  </svg>
                  <h1 style={S.title}>MIRROR MAZE</h1>
                </div>
                <span style={S.badge}>
                  <b style={S.badgeLbl}>LEVEL {levelIndex + 1}</b>
                </span>
              </div>
              <p className="fu d1" style={S.hint}>{level.hint}</p>
              <div className="fu d2" style={{ ...S.board, ...(showWin ? { boxShadow: "0 0 60px rgba(0,255,100,.15), 0 24px 64px rgba(0,0,0,.45)" } : {}) }}>
                <div style={{ position: "relative", width: W, height: W }}>
                  <svg width={W} height={W} style={{ position: "absolute", top: 0, left: 0, pointerEvents: "none" }}>
                    <defs>
                      {Object.entries(PALETTE).map(([id, c]) => (
                        <filter key={id} id={`g-${id}`} x="-50%" y="-50%" width="200%" height="200%">
                          <feGaussianBlur stdDeviation="6" result="b" />
                          <feFlood floodColor={c.beam} floodOpacity=".5" result="c" />
                          <feComposite in="c" in2="b" operator="in" result="cb" />
                          <feMerge><feMergeNode in="cb" /><feMergeNode in="cb" /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>
                      ))}
                    </defs>
                    {Array.from({ length: GRID + 1 }, (_, i) => (
                      <g key={`gl${i}`}>
                        <line x1={PAD + i * CELL} y1={PAD} x2={PAD + i * CELL} y2={PAD + GRID * CELL} stroke="rgba(255,255,255,.055)" />
                        <line x1={PAD} y1={PAD + i * CELL} x2={PAD + GRID * CELL} y2={PAD + i * CELL} stroke="rgba(255,255,255,.055)" />
                      </g>
                    ))}
                    {Array.from({ length: GRID + 1 }, (_, r) => Array.from({ length: GRID + 1 }, (_, c) => (
                      <circle key={`d${r}${c}`} cx={PAD + c * CELL} cy={PAD + r * CELL} r="1.2" fill="rgba(255,255,255,.09)" />
                    )))}
                    {level.walls.map((w, i) => {
                      const x = w.col * CELL + PAD + 5, y = w.row * CELL + PAD + 5, s = CELL - 10;
                      return (
                        <g key={`w${i}`}>
                          <rect x={x} y={y} width={s} height={s} rx="5" fill="rgba(16,20,32,.95)" stroke="rgba(255,255,255,.07)" />
                          <line x1={x+10} y1={y+10} x2={x+s-10} y2={y+s-10} stroke="rgba(255,255,255,.055)" strokeWidth="1.5" />
                          <line x1={x+s-10} y1={y+10} x2={x+10} y2={y+s-10} stroke="rgba(255,255,255,.055)" strokeWidth="1.5" />
                        </g>
                      );
                    })}
                    {level.sources.map((src, i) => {
                      const pal = PALETTE[src.color], sx = px(src.col), sy = py(src.row);
                      const [dr, dc] = DELTA[src.dir];
                      const bw = dc !== 0 ? 13 : 18, bh = dr !== 0 ? 13 : 18;
                      const bx = sx - dc * 4 - bw / 2, by = sy - dr * 4 - bh / 2;
                      const nx = sx + dc * 13, ny = sy + dr * 13;
                      return (
                        <g key={`src${i}`}>
                          <circle cx={sx} cy={sy} r="18" fill={pal.beam} className="po" />
                          <rect x={bx} y={by} width={bw} height={bh} rx="3"
                            fill="rgba(8,12,28,.92)" stroke={pal.beam} strokeWidth="1.2" opacity=".8" />
                          <line x1={sx - dc * 1} y1={sy - dr * 1} x2={nx} y2={ny}
                            stroke={pal.beam} strokeWidth="7" strokeLinecap="round" opacity=".18" />
                          <line x1={sx - dc * 1} y1={sy - dr * 1} x2={nx} y2={ny}
                            stroke={pal.beam} strokeWidth="3.5" strokeLinecap="round" opacity=".75" />
                          <circle cx={nx} cy={ny} r="5" fill={pal.beam} opacity=".95" />
                          <circle cx={nx} cy={ny} r="9" fill={pal.beam} opacity=".2" />
                        </g>
                      );
                    })}
                    {level.targets.map((t, i) => {
                      const pal = PALETTE[t.color], x = px(t.col), y = py(t.row), lit = litSet.has(kk(t.row, t.col));
                      return (
                        <g key={`tgt${i}`}>
                          <circle cx={x} cy={y} r="17" fill="none" stroke={pal.beam} strokeWidth="1" opacity=".25" className={lit ? "pl" : "ps"} style={{ transformOrigin: `${x}px ${y}px` }} />
                          <circle cx={x} cy={y} r="14" fill="none" stroke={pal.beam} strokeWidth={lit ? 2.5 : 1.5} opacity={lit ? 1 : 0.35} strokeDasharray={lit ? "none" : "4 3"} />
                          <circle cx={x} cy={y} r={lit ? 6 : 4} fill={lit ? pal.beam : "none"} stroke={pal.beam} strokeWidth="2" opacity={lit ? 1 : 0.35} />
                          {lit && <circle cx={x} cy={y} r="20" fill={pal.beam} opacity=".1" />}
                        </g>
                      );
                    })}
                    {beams.map((b, bi) => {
                      if (b.pts.length < 2) return null;
                      const pal = PALETTE[b.color];
                      const d = b.pts.map((p, j) => `${j ? "L" : "M"}${p.x} ${p.y}`).join(" ");
                      return (
                        <g key={`bm${bi}`}>
                          <path d={d} fill="none" stroke={pal.beam} strokeWidth="14" opacity=".07" strokeLinecap="round" strokeLinejoin="round" />
                          <path d={d} fill="none" stroke={pal.beam} strokeWidth="6" opacity=".22" strokeLinecap="round" strokeLinejoin="round" />
                          <path d={d} fill="none" stroke={pal.beam} strokeWidth="2.5" opacity=".85" strokeLinecap="round" strokeLinejoin="round" />
                          <path d={d} fill="none" stroke="#fff" strokeWidth="1" opacity=".4" strokeLinecap="round" strokeLinejoin="round" />
                        </g>
                      );
                    })}
                    {Object.entries(mirrors).map(([id, type]) => {
                      const [r, c] = id.split(",").map(Number);
                      const cx = c * CELL + PAD + CELL / 2, cy = r * CELL + PAD + CELL / 2;
                      const len = CELL * 0.82, rot = type === "/" ? -45 : 45;
                      const t = `rotate(${rot},${cx},${cy})`;
                      return (
                        <g key={`mr${id}`} className="mp">
                          <rect x={cx-len/2} y={cy-4.5} width={len} height={9} rx="2.5"
                            fill="rgba(8,18,45,.9)" transform={t} />
                          <line x1={cx-len/2+4} y1={cy-1} x2={cx+len/2-4} y2={cy-1}
                            stroke="rgba(255,255,255,.9)" strokeWidth="2" strokeLinecap="round" transform={t} />
                          <line x1={cx-len/2+4} y1={cy+2} x2={cx+len/2-4} y2={cy+2}
                            stroke="rgba(0,0,0,.45)" strokeWidth="1" strokeLinecap="round" transform={t} />
                        </g>
                      );
                    })}
                  </svg>
                  {Array.from({ length: GRID }, (_, r) => Array.from({ length: GRID }, (_, c) => {
                    const id = kk(r, c);
                    const ok = !wallSet.has(id) && !tgtSet.has(id);
                    return (
                      <div key={id} className={ok && !won ? "ch" : ""} onClick={() => ok && click(r, c)}
                        style={{ position: "absolute", left: c*CELL+PAD, top: r*CELL+PAD, width: CELL, height: CELL, cursor: ok && !won ? "pointer" : "default", borderRadius: 4, zIndex: 2 }} />
                    );
                  }))}
                </div>
              </div>
              <div className="fu d3" style={{ ...S.controls, width: W + 22, marginLeft: -50, justifyContent: "space-between" }}>
                <div style={{ ...S.stat, whiteSpace: "nowrap" }}>
                  <span style={S.statLbl}>MIRRORS LEFT</span>
                  <span style={S.statVal}>{level.maxMirrors - mc}</span>
                </div>
                <button onClick={() => setShowHelp(true)} style={{ ...S.btn, color: "#f5c518", borderColor: "rgba(245,197,24,.3)" }} className="br">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ marginRight: 6 }}>
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.5 9a2.5 2.5 0 015 .5c0 1.5-2.5 2-2.5 3.5" />
                    <circle cx="12" cy="17" r=".5" fill="currentColor" />
                  </svg>
                  HELP
                </button>
                <button onClick={reset} style={{ ...S.btn, color: "#ff4d4d", borderColor: "rgba(255,77,77,.3)" }} className="br">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style={{ marginRight: 6 }}>
                    <path d="M2 8a6 6 0 0110.2-4.3L10 6h5V1l-2.1 2.1A7.5 7.5 0 00.5 8H2zm12 0a6 6 0 01-10.2 4.3L6 10H1v5l2.1-2.1A7.5 7.5 0 0015.5 8H14z" />
                  </svg>
                  RESET
                </button>
                <div style={S.stat}>
                  <span style={S.statLbl}>TARGETS</span>
                  <span style={S.statVal}>{litSet.size}<span style={{ opacity: 0.35 }}> / {level.targets.length}</span></span>
                </div>
              </div>
              {showHelp && (
                <div style={S.ov} className="fu">
                  <div style={S.wc}>
                    <h2 style={{ ...S.wt, color: "#e4ecf4", marginBottom: 6 }}>HOW TO PLAY</h2>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <svg width="14" height="14" viewBox="0 0 14 14" style={{ marginRight: 8, flexShrink: 0, display: "block" }}>
                          <rect x="1" y="5.5" width="12" height="3" rx="1" fill="rgba(230,235,255,.75)" transform="rotate(-45,7,7)" />
                        </svg>
                        Click any cell to place a mirror
                      </div>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <span style={{ fontSize: 16, marginRight: 8, lineHeight: 1, color: "rgba(170,210,255,.9)", flexShrink: 0 }}>↻</span>
                        Click a mirror to rotate it
                      </div>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <svg width="14" height="14" viewBox="0 0 14 14" stroke="#ff5555" strokeWidth="2" strokeLinecap="round" style={{ marginRight: 8, flexShrink: 0, display: "block" }}>
                          <line x1="3" y1="3" x2="11" y2="11" />
                          <line x1="11" y1="3" x2="3" y2="11" />
                        </svg>
                        Click again to remove it
                      </div>
                    </div>
                    {started
                      ? <button onClick={() => setShowHelp(false)} style={S.wb} className="br">Close</button>
                      : <button onClick={() => { setShowHelp(false); setStarted(true); }} style={S.wb} className="br">Start!</button>
                    }
                  </div>
                </div>
              )}
              {showWin && (
                <div style={S.ov} className="fu">
                  <div style={S.wc}>
                    <svg width="52" height="52" viewBox="0 0 52 52" className="fl">
                      <circle cx="26" cy="26" r="24" fill="none" stroke="#0f6" strokeWidth="2.5" />
                      <path d="M15 26L22 33L37 19" fill="none" stroke="#0f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                    <h2 style={S.wt}>MAZE COMPLETE</h2>
                    <p style={S.ws}>LEVEL {levelIndex + 1}</p>
                    <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
                      {onNext
                        ? <>
                            <button onClick={onBack} style={{ ...S.wb, border: "1px solid rgba(255,45,85,.25)", background: "rgba(255,45,85,.08)", color: "#ff2d55" }} className="br">HOME</button>
                            <button onClick={onNext} style={S.wb} className="br">NEXT LEVEL →</button>
                          </>
                        : <button onClick={onBack} style={S.wb} className="br">HOME</button>
                      }
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const CSS = `
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@300;400&display=swap');
        #root *{box-sizing:border-box}
        @keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ps{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.55;transform:scale(1.12)}}
        @keyframes po{0%,100%{opacity:.06}50%{opacity:.18}}
        .po{animation:po 2.2s ease-in-out infinite}
        @keyframes pl{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}
        @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes mp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
        .fu{animation:fu .7s cubic-bezier(.16,1,.3,1) both}
        .d1{animation-delay:.15s}.d2{animation-delay:.25s}.d3{animation-delay:.4s}.d4{animation-delay:.5s}
        .ps{animation:ps 3s ease-in-out infinite}
        .pl{animation:pl 1.4s ease-in-out infinite}
        .fl{animation:fl 3s ease-in-out infinite}
        .mp{animation:mp .2s ease-out both}
        .ch{transition:background .12s}
        .ch:hover{background:rgba(255,255,255,.05)!important}
        .ch:active{background:rgba(255,255,255,.09)!important}
        .br{transition:all .2s}
        .br:hover{background:rgba(255,255,255,.08)!important;border-color:rgba(255,255,255,.2)!important}
        `;

        const S = {
          root: { minHeight: "100vh", background: "linear-gradient(168deg,#080a12 0%,#0c0f1c 50%,#0e1225 100%)", display: "flex", flexDirection: "column", alignItems: "center", padding: "28px 16px 40px", fontFamily: "'Oxanium',sans-serif", color: "#dde4ec", position: "relative" },
          head: { display: "flex", flexDirection: "column", alignItems: "center", gap: 10 },
          logoRow: { display: "flex", alignItems: "center", gap: 10 },
          title: { margin: 0, fontSize: 26, fontWeight: 700, letterSpacing: 7, color: "#e4ecf4" },
          badge: { display: "flex", alignItems: "center", gap: 10, padding: "6px 20px", borderRadius: 20, background: "rgba(0,255,100,.05)", border: "1px solid rgba(0,255,100,.13)", fontSize: 13, color: "rgba(0,255,100,.85)", letterSpacing: 1 },
          badgeLbl: { fontSize: 13, fontWeight: 700, letterSpacing: 2, color: "rgba(0,255,100,.7)", fontFamily: "'IBM Plex Mono',monospace" },
          hint: { margin: "14px 0 18px", fontSize: 13, color: "rgba(190,200,215,.4)", letterSpacing: 1, fontWeight: 300 },
          board: { position: "relative", background: "rgba(6,8,16,.55)", borderRadius: 14, padding: 10, border: "1px solid rgba(255,255,255,.05)", boxShadow: "0 24px 64px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03)", transition: "box-shadow .6s ease" },
          controls: { display: "flex", alignItems: "center", gap: 28, marginTop: 20 },
          stat: { display: "flex", flexDirection: "column", alignItems: "center", gap: 1, minWidth: 72 },
          statLbl: { fontSize: 9, fontWeight: 600, letterSpacing: 2.5, color: "rgba(190,200,215,.35)", fontFamily: "'IBM Plex Mono',monospace" },
          statVal: { fontSize: 22, fontWeight: 700 },
          btn: { display: "flex", alignItems: "center", padding: "10px 26px", borderRadius: 8, border: "1px solid rgba(255,255,255,.1)", background: "rgba(255,255,255,.03)", color: "rgba(190,200,215,.65)", fontSize: 11, fontWeight: 600, letterSpacing: 2.5, fontFamily: "'Oxanium',sans-serif", cursor: "pointer" },
          legend: { display: "flex", gap: 18, marginTop: 14, flexWrap: "wrap", justifyContent: "center" },
          li: { display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "rgba(190,200,215,.3)", letterSpacing: .4 },
          ld: { width: 7, height: 7, borderRadius: "50%", display: "inline-block" },
          ov: { position: "fixed", inset: 0, background: "rgba(4,6,12,.82)", backdropFilter: "blur(10px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
          wc: { display: "flex", flexDirection: "column", alignItems: "center", gap: 14, padding: "44px 60px", borderRadius: 18, background: "rgba(12,16,28,.95)", border: "1px solid rgba(0,255,100,.18)", boxShadow: "0 0 80px rgba(0,255,100,.08)" },
          wt: { margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: 5, color: "#0f6" },
          ws: { margin: 0, fontSize: 14, color: "rgba(190,200,215,.55)", fontWeight: 300 },
          wb: { marginTop: 6, padding: "11px 34px", borderRadius: 8, border: "1px solid rgba(0,255,100,.25)", background: "rgba(0,255,100,.08)", color: "#0f6", fontSize: 12, fontWeight: 600, letterSpacing: 2.5, fontFamily: "'Oxanium',sans-serif", cursor: "pointer" },
          backBtn: { alignSelf: "flex-start", background: "none", border: "none", color: "rgba(255,255,255,0.75)", fontFamily: "'Jost', sans-serif", fontWeight: 300, fontSize: "0.75rem", letterSpacing: "0.2em", textTransform: "uppercase", cursor: "pointer", marginBottom: 16, padding: 0, textDecoration: "none" },
        };

        function App() {
          const [screen, setScreen] = useState("home");
          const [levelIndex, setLevelIndex] = useState(0);
          const [maxUnlocked, setMaxUnlocked] = useState(() => Number(localStorage.getItem("mm_maxUnlocked") || 0));
          const goHome = () => setScreen("home");
          const goLevel = (idx) => { setLevelIndex(idx); setScreen("game"); };
          const handleComplete = () => setMaxUnlocked((prev) => {
            const next = Math.max(prev, levelIndex + 1);
            localStorage.setItem("mm_maxUnlocked", next);
            return next;
          });
          if (screen === "home") return <HomeScreen onPlay={goLevel} maxUnlocked={maxUnlocked} />;
          const hasNext = levelIndex < LEVELS.length - 1;
          return (
            <MirrorMaze
              key={levelIndex}
              onBack={goHome}
              onNext={hasNext ? () => goLevel(levelIndex + 1) : null}
              onComplete={handleComplete}
              levelIndex={levelIndex}
            />
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
<script src="../report-bug.js"></script>
</body>
</html>
