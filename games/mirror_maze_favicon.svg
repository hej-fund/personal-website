<svg width="300" height="300" viewBox="20 20 260 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green gradient -->
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9c"/>
      <stop offset="50%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#b2ff59"/>
    </linearGradient>

    <!-- Maze wall glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Red laser glow -->
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blue laser glow -->
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orange axis glow -->
    <filter id="orangeGlow" filterUnits="userSpaceOnUse" x="125" y="0" width="50" height="300">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Red laser — wide ambient glow (behind walls) -->
  <path d="M40 200 L100 140 L180 220 L260 140"
    stroke="#ff2d55" stroke-width="20" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.12"/>

  <!-- Blue laser — wide ambient glow (behind walls) -->
  <path d="M260 200 L200 140 L120 220 L40 140"
    stroke="#00aaff" stroke-width="20" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.12"/>

  <!-- Left maze -->
  <path d="
    M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120
    L140 60 L180 60 L180 140 L100 140 L100 200 L160 200
    L160 240 L60 240 L60 180 L120 180 L120 160 L80 160
  "
    stroke="url(#greenGlow)" stroke-width="9" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#softGlow)"/>

  <!-- Mirror right maze -->
  <g transform="translate(300,0) scale(-1,1)">
    <path d="
      M40 260 L40 40 L120 40 L120 80 L80 80 L80 120 L140 120
      L140 60 L180 60 L180 140 L100 140 L100 200 L160 200
      L160 240 L60 240 L60 180 L120 180 L120 160 L80 160
    "
      stroke="url(#greenGlow)" stroke-width="9" fill="none"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#softGlow)"/>
  </g>

  <!-- Central mirror axis -->
  <line x1="150" y1="30" x2="150" y2="270"
        stroke="#ff6a00" stroke-width="5"
        stroke-dasharray="14,8" opacity="1"
        filter="url(#orangeGlow)"/>

  <!-- Red laser — medium glow (on top of walls) -->
  <path d="M40 200 L100 140 L180 220 L260 140"
    stroke="#ff2d55" stroke-width="9" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.25"/>

  <!-- Red laser — bright core -->
  <path d="M40 200 L100 140 L180 220 L260 140"
    stroke="#ff2d55" stroke-width="4" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#redGlow)" opacity="0.9"/>

  <!-- Blue laser — medium glow (on top of walls) -->
  <path d="M260 200 L200 140 L120 220 L40 140"
    stroke="#00aaff" stroke-width="9" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.25"/>

  <!-- Blue laser — bright core -->
  <path d="M260 200 L200 140 L120 220 L40 140"
    stroke="#00aaff" stroke-width="4" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#blueGlow)" opacity="0.9"/>
</svg>
