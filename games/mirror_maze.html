    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #080a12; }

        /* ── Report Bug button ── */
        .btn-report {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            padding: 10px 22px;
            background: rgba(255,45,85,.08);
            color: #ff2d55;
            border: 1px solid rgba(255,45,85,.25);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Oxanium', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-report:hover { background: rgba(255,45,85,.16); border-color: rgba(255,45,85,.5); }

        /* ── Bug modal ── */
        .bug-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }
        .bug-modal-overlay.active { display: flex; }
        .bug-modal {
            position: relative;
            background: rgba(8,10,20,.97);
            border: 1px solid rgba(0,255,100,.15);
            border-radius: 14px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 460px;
            margin: 1rem;
            box-shadow: 0 0 80px rgba(0,255,100,.06), 0 24px 60px rgba(0,0,0,0.7);
        }
        .bug-modal-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s ease;
        }
        .bug-modal-close:hover { color: white; }
        .bug-modal-eyebrow {
            font-family: 'Oxanium', sans-serif;
            font-weight: 600;
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(0,255,100,.5);
            margin: 0 0 0.6rem;
        }
        .bug-modal-title {
            font-family: 'Oxanium', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #e4ecf4;
            margin: 0 0 1.75rem;
        }
        .bug-form { display: flex; flex-direction: column; gap: 1.25rem; }
        .bug-form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .bug-form-group label {
            font-family: 'Oxanium', sans-serif;
            font-weight: 600;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(190,200,215,.5);
        }
        .bug-form-group input,
        .bug-form-group textarea,
        .bug-form-group select {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            color: #e4ecf4;
            font-family: 'Oxanium', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            resize: vertical;
            transition: border-color 0.2s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        .bug-form-group select { background: #0d1120 !important; }
        .bug-form-group select option { background: #0d1120; color: #e4ecf4; }
        .bug-form-group input::placeholder,
        .bug-form-group textarea::placeholder { color: rgba(255,255,255,0.2); }
        .bug-form-group input:focus,
        .bug-form-group textarea:focus,
        .bug-form-group select:focus { border-color: rgba(0,255,100,.3); }
        .bug-form-group input.field-error,
        .bug-form-group textarea.field-error,
        .bug-form-group select.field-error { border-color: #ff2d55; }
        .bug-form-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.25rem;
        }
        .btn-submit-bug {
            padding: 10px 28px;
            background: rgba(255,45,85,.08);
            color: #ff2d55;
            border: 1px solid rgba(255,45,85,.25);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Oxanium', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-submit-bug:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-submit-bug:not(:disabled):hover { background: rgba(255,45,85,.16); border-color: rgba(255,45,85,.5); }
        .btn-clear-bug {
            padding: 10px 22px;
            background: rgba(184,134,11,.08);
            color: #c99a12;
            border: 1px solid rgba(184,134,11,.3);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Oxanium', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-clear-bug:hover { background: rgba(184,134,11,.16); border-color: rgba(184,134,11,.5); }
        .bug-form-status {
            font-family: 'Oxanium', sans-serif;
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            display: none;
        }
        .bug-form-status.success {
            display: block;
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            border: 1px solid rgba(46,204,113,0.3);
        }
        .bug-form-status.error {
            display: block;
            background: rgba(231,76,60,0.15);
            color: #ff2020;
            border: 1px solid rgba(231,76,60,0.3);
        }
    </style>
</head>
<body>
<button class="btn-report">Report Bug</button>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
        const { useState, useMemo, useEffect, useCallback } = React;

        function BackBtn({ href, onClick, label }) {
          const [hov, setHov] = React.useState(false);
          const s = { display: "inline-flex", alignItems: "center", gap: 6, padding: "10px 18px", borderRadius: 8, border: `1px solid ${hov ? "rgba(255,255,255,.25)" : "rgba(255,255,255,.1)"}`, background: hov ? "rgba(255,255,255,.07)" : "rgba(255,255,255,.03)", color: hov ? "#e4ecf4" : "rgba(190,200,215,.85)", fontFamily: "'Oxanium',sans-serif", fontWeight: 600, fontSize: 11, letterSpacing: 2.5, textTransform: "uppercase", cursor: "pointer", textDecoration: "none", transition: "all .2s" };
          const inner = <><span style={{ fontSize: 12, lineHeight: 1 }}>&#8592;</span><span>{label}</span></>;
          if (href) return <a href={href} style={s} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>{inner}</a>;
          return <button style={s} onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>{inner}</button>;
        }

        function VolumeBtn({ musicOn, toggleMusic }) {
          return (
            <button onClick={toggleMusic} className="br" style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "10px 14px", borderRadius: 8, border: `1px solid ${musicOn ? "rgba(255,106,0,.3)" : "rgba(255,255,255,.1)"}`, background: musicOn ? "rgba(255,106,0,.06)" : "rgba(255,255,255,.03)", cursor: "pointer", color: musicOn ? "#ff6a00" : "rgba(190,200,215,.4)", transition: "all .2s", lineHeight: 1, padding: "10px 10px" }}>
              {musicOn
                ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ display: "block" }}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
                : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ display: "block" }}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
              }
            </button>
          );
        }

        function HomeScreen({ onPlay, maxUnlocked, musicOn, toggleMusic }) {
          return (
            <div style={SH.root}>
              <style>{CSS}</style>
              <div style={{ position: "absolute", top: "1.5rem", left: "1.5rem" }}>
                <VolumeBtn musicOn={musicOn} toggleMusic={toggleMusic} />
              </div>
              <div style={SH.center}>
                <div className="fu" style={SH.head}>
                  <svg width="40" height="40" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                      <filter id="hgG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                      <filter id="hgR" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                      <filter id="hgB" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    </defs>
                    <g transform="translate(0,11)">
                      <polyline points="15,175 15,5 100,85 185,5 185,175" stroke="#39FF14" strokeWidth="14" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.2"/>
                      <polyline points="15,175 15,5 100,85 185,5 185,175" stroke="#39FF14" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#hgG)"/>
                      <polyline points="38,175 38,44 100,118 162,44 162,175" stroke="#39FF14" strokeWidth="14" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.15"/>
                      <polyline points="38,175 38,44 100,118 162,44 162,175" stroke="#39FF14" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#hgG)"/>
                      <polyline points="15,42 38,67 15,92 38,117 15,142 38,162" stroke="#ff2d55" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="0 9999" filter="url(#hgR)">
                        <animate attributeName="stroke-dasharray" values="0 9999;170 9999;0 9999;170 9999;0 9999" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                        <animate attributeName="stroke-dashoffset" values="0;0;-170;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                      </polyline>
                      <polyline points="162,162 185,142 162,117 185,92 162,67 185,42" stroke="#00aaff" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="0 9999" filter="url(#hgB)">
                        <animate attributeName="stroke-dasharray" values="0 9999;170 9999;0 9999;170 9999;0 9999" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                        <animate attributeName="stroke-dashoffset" values="0;0;-170;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                      </polyline>
                    </g>
                  </svg>
                  <span style={{...SH.title, marginLeft: -12}} className="retro-grad">IRROR</span>
                  <svg width="40" height="40" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style={{marginLeft: -2}}>
                    <defs>
                      <filter id="hmG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                      <filter id="hmR" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                      <filter id="hmB" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    </defs>
                    <g transform="translate(0,11)">
                      <polyline points="15,175 15,5 100,85 185,5 185,175" stroke="#39FF14" strokeWidth="14" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.2"/>
                      <polyline points="15,175 15,5 100,85 185,5 185,175" stroke="#39FF14" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#hmG)"/>
                      <polyline points="38,175 38,44 100,118 162,44 162,175" stroke="#39FF14" strokeWidth="14" fill="none" strokeLinecap="round" strokeLinejoin="round" opacity="0.15"/>
                      <polyline points="38,175 38,44 100,118 162,44 162,175" stroke="#39FF14" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" filter="url(#hmG)"/>
                      <polyline points="15,42 38,67 15,92 38,117 15,142 38,162" stroke="#00aaff" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="0 9999" filter="url(#hmB)">
                        <animate attributeName="stroke-dasharray" values="0 9999;170 9999;0 9999;170 9999;0 9999" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                        <animate attributeName="stroke-dashoffset" values="0;0;-170;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                      </polyline>
                      <polyline points="162,162 185,142 162,117 185,92 162,67 185,42" stroke="#ff2d55" strokeWidth="5" fill="none" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="0 9999" filter="url(#hmR)">
                        <animate attributeName="stroke-dasharray" values="0 9999;170 9999;0 9999;170 9999;0 9999" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                        <animate attributeName="stroke-dashoffset" values="0;0;-170;0;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite" calcMode="linear"/>
                      </polyline>
                    </g>
                  </svg>
                  <span style={{...SH.title, marginLeft: -12}} className="retro-grad">AZE</span>
                </div>
                <div className="fu d1" style={SH.grid}>
                  {LEVELS.map((lv, idx) => {
                    const locked = idx > maxUnlocked;
                    return (
                      <div style={{ ...SH.card, ...(locked ? { opacity: 0.55, cursor: "default" } : {}) }}
                        className={locked ? "" : "br"} key={idx} onClick={() => !locked && onPlay(idx)}>
                        <span style={{ ...SH.cardLbl, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, lineHeight: 1 }}>
                          LEVEL {idx + 1}
                          {locked && (
                            <svg width="13" height="15" viewBox="0 0 13 15" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: "block" , position: "relative", top: -2 }}>
                              <rect x="1.5" y="6.5" width="10" height="8" rx="1.5" stroke="rgba(0,255,100,.7)" strokeWidth="1.5"/>
                              <path d="M3.5 6.5V4.5a3 3 0 016 0v2" stroke="rgba(0,255,100,.7)" strokeWidth="1.5" strokeLinecap="round"/>
                              <rect x="5.5" y="9.5" width="2" height="2" rx="1" fill="rgba(0,255,100,.7)"/>
                            </svg>
                          )}
                        </span>
                        <span style={SH.cardMeta}>{lv.sources.length} beam{lv.sources.length > 1 ? "s" : ""} &nbsp;·&nbsp; {lv.maxMirrors} mirrors</span>
                        {(() => {
                          const t = { beginner: ["BEGINNER","rgba(0,170,255,.9)","rgba(0,170,255,.12)","rgba(0,170,255,.28)"], easy: ["EASY","rgba(0,255,100,.8)","rgba(0,255,100,.12)","rgba(0,255,100,.25)"], medium: ["MEDIUM","rgba(245,197,24,.85)","rgba(245,197,24,.1)","rgba(245,197,24,.28)"], hard: ["HARD","rgba(255,45,85,.85)","rgba(255,45,85,.1)","rgba(255,45,85,.28)"], extreme: ["EXTREME","rgba(180,80,255,.9)","rgba(180,80,255,.1)","rgba(180,80,255,.28)"] }[lv.difficulty];
                          return t ? <span style={{ marginTop: 4, fontSize: 9, fontWeight: 700, letterSpacing: 2, fontFamily: "'IBM Plex Mono',monospace", color: t[1], background: t[2], border: `1px solid ${t[3]}`, borderRadius: 4, padding: "2px 7px" }}>{t[0]}</span> : null;
                        })()}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        const SH = {
          root: { minHeight: "100vh", background: "linear-gradient(168deg,#080a12 0%,#0c0f1c 50%,#0e1225 100%)", display: "flex", flexDirection: "column", alignItems: "center", fontFamily: "'Oxanium',sans-serif", color: "#dde4ec", position: "relative" },
          topBar: { position: "absolute", top: "2.2rem", left: "2.5rem" },
          center: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, padding: "6rem 16px 40px" },
          head: { display: "flex", alignItems: "center", marginBottom: 32, gap: 20 },
          title: { margin: 0, marginTop: 3, fontSize: 32, fontWeight: 700, letterSpacing: 7, color: "#e4ecf4", lineHeight: 1 },
          grid: { display: "flex", flexWrap: "wrap", gap: 12, width: "100%", maxWidth: 630, justifyContent: "center" },
          card: { padding: "20px 24px", borderRadius: 12, border: "1px solid rgba(0,255,100,.18)", background: "rgba(0,255,100,.04)", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, width: "calc(33.333% - 8px)", boxSizing: "border-box" },
          cardLbl: { fontSize: 18, fontWeight: 600, letterSpacing: 1, color: "rgba(0,255,100,.85)", fontFamily: "'Oxanium',sans-serif", textAlign: "center" },
          cardSub: { fontSize: 12, color: "rgba(0,255,100,.55)", letterSpacing: 1.5, fontFamily: "'Jost',sans-serif", fontWeight: 300, textAlign: "center" },
          cardMeta: { fontSize: 10, color: "rgba(190,200,215,.25)", letterSpacing: 1, fontFamily: "'IBM Plex Mono',monospace", textAlign: "center" },
        };

        const GRID = 8;
        const CELL = 44;
        const PAD = 15;

        const DELTA = { up: [-1, 0], down: [1, 0], left: [0, -1], right: [0, 1] };
        const REFLECT = {
          "/":  { right: "up", left: "down", up: "right", down: "left" },
          "\\": { right: "down", left: "up", up: "left", down: "right" },
        };

        const PALETTE = {
          red:   { beam: "#ff2d55", glow: "#ff2d5560" },
          blue:  { beam: "#0af",    glow: "#00aaff60" },
          green: { beam: "#00ff9c", glow: "#00ff9c60" },
        };

        const LEVELS = [
          {
            difficulty: "beginner",
            maxMirrors: 4,
            sources: [
              { row: 1, col: -1, dir: "right", color: "red" },
              { row: -1, col: 6, dir: "down",  color: "blue" },
            ],
            targets: [
              { row: 6, col: 6, color: "red" },
              { row: 6, col: 1, color: "blue" },
            ],
            walls: [
              { row: 3, col: 3 },
              { row: 4, col: 6 },
            ],
          },
          {
            difficulty: "easy",
            maxMirrors: 4,
            sources: [
              { row: 2, col: -1, dir: "right", color: "red"   },
              { row: -1, col: 7, dir: "down",  color: "blue"  },
              { row: 8,  col: 3, dir: "up",    color: "green" },
            ],
            targets: [
              { row: 6, col: 0, color: "red"   },
              { row: 0, col: 1, color: "blue"  },
              { row: 4, col: 7, color: "green" },
            ],
            walls: [
              { row: 4, col: 0 },
              { row: 0, col: 5 },
              { row: 1, col: 4 },
              { row: 5, col: 4 },
              { row: 7, col: 1 },
            ],
          },
          {
            difficulty: "easy",
            maxMirrors: 6,
            sources: [
              { row: 8,  col: 0,  dir: "up",    color: "red"   },
              { row: 0,  col: -1, dir: "right", color: "blue"  },
              { row: -1, col: 7,  dir: "down",  color: "green" },
            ],
            targets: [
              { row: 7, col: 5, color: "red"   },
              { row: 5, col: 0, color: "blue"  },
              { row: 0, col: 2, color: "green" },
            ],
            walls: [
              { row: 0, col: 5 },
              { row: 1, col: 6 },
              { row: 2, col: 5 },
              { row: 3, col: 1 },
              { row: 4, col: 7 },
              { row: 5, col: 4 },
              { row: 6, col: 2 },
              { row: 7, col: 2 },
            ],
          },
          {
            difficulty: "medium",
            maxMirrors: 5,
            sources: [
              { row: -1, col: 3, dir: "down",  color: "red"   },
              { row: 4,  col: 8, dir: "left",  color: "blue"  },
              { row: 8,  col: 1, dir: "up",    color: "green" },
            ],

        function traceBeam(src, mirrors, walls, targets) {
          const wallSet = new Set(walls.map((w) => kk(w.row, w.col)));
          const tgtMap = Object.fromEntries(targets.map((t) => [kk(t.row, t.col), t]));
          const pts = [{ x: px(src.col), y: py(src.row) }];
          let dir = src.dir;
          let [dr, dc] = DELTA[dir];
          let r = src.row + dr;
          let c = src.col + dc;
          const visited = new Set();
          const hits = [];
          for (let i = 0; i < 200; i++) {
            if (r < 0 || r >= GRID || c < 0 || c >= GRID) { pts.push({ x: px(c), y: py(r) }); break; }
            const vk = `${r},${c},${dir}`;
            if (visited.has(vk)) break;
            visited.add(vk);
            if (wallSet.has(kk(r, c))) {
              pts.push({ x: px(c) - (DELTA[dir][1] * CELL) / 2, y: py(r) - (DELTA[dir][0] * CELL) / 2 });
              break;
            }
            if (tgtMap[kk(r, c)]) hits.push(tgtMap[kk(r, c)]);
            const m = mirrors[kk(r, c)];
            if (m) { pts.push({ x: px(c), y: py(r) }); dir = REFLECT[m][dir]; }
            [dr, dc] = DELTA[dir];
            r += dr; c += dc;
          }
          return { pts, hits, color: src.color };

                </button>
                <button onClick={reset} style={{ ...S.btn, color: "#ff4d4d", borderColor: "rgba(255,77,77,.3)" }} className="br">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style={{ marginRight: 6 }}>
                    <path d="M2 8a6 6 0 0110.2-4.3L10 6h5V1l-2.1 2.1A7.5 7.5 0 00.5 8H2zm12 0a6 6 0 01-10.2 4.3L6 10H1v5l2.1-2.1A7.5 7.5 0 0015.5 8H14z" />
                  </svg>
                  RESET
                </button>
                <div style={S.stat}>
                  <span style={S.statLbl}>TARGETS</span>
                  <span style={S.statVal}>{litSet.size}<span style={{ opacity: 0.35 }}> / {level.targets.length}</span></span>
                </div>
              </div>
              {showHelp && (
                <div style={S.ov} className="fu">
                  <div style={S.wc}>
                    <h2 style={{ ...S.wt, color: "#e4ecf4", marginBottom: 6 }}>HOW TO PLAY</h2>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <svg width="24" height="17" viewBox="0 0 20 14" style={{ marginRight: 4, marginLeft: -3, flexShrink: 0, display: "block" }}>
                          <line x1="0" y1="7" x2="20" y2="7" stroke="#0af" strokeWidth="1.5" strokeLinecap="round" opacity="0.75" />
                          <circle cx="10" cy="7" r="5.5" fill="#0af" opacity="0.12" />
                          <circle cx="10" cy="7" r="5" fill="none" stroke="#0af" strokeWidth="1.5" />
                          <circle cx="10" cy="7" r="2" fill="#0af" />
                        </svg>
                        Guide the beams to their matching targets
                      </div>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <svg width="17" height="17" viewBox="0 0 14 14" style={{ marginRight: 8, flexShrink: 0, display: "block" }}>
                          <line x1="2" y1="12" x2="12" y2="2" stroke="rgba(230,235,255,.85)" strokeWidth="2" strokeLinecap="round" />
                        </svg>
                        Click a cell to place a mirror
                      </div>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <span style={{ fontSize: 19, marginRight: 8, lineHeight: 1, color: "#b39ddb", flexShrink: 0, width: 17, display: "inline-block", textAlign: "center" }}>↻</span>
                        Click a mirror to rotate it
                      </div>
                      <div style={{ ...S.li, alignItems: "center" }}>
                        <svg width="17" height="17" viewBox="0 0 14 14" stroke="#ff5555" strokeWidth="2" strokeLinecap="round" style={{ marginRight: 8, flexShrink: 0, display: "block" }}>
                          <line x1="3" y1="3" x2="11" y2="11" />
                          <line x1="11" y1="3" x2="3" y2="11" />
                        </svg>
                        Click again to remove it
                      </div>
                    </div>
                    {started
                      ? <button onClick={() => setShowHelp(false)} style={S.wb} className="br">Close</button>
                      : <button onClick={() => { setShowHelp(false); setStarted(true); }} style={S.wb} className="br">Start!</button>
                    }
                  </div>
                </div>
              )}
              {showWin && (
                <div style={S.ov} className="fu">
                    <div style={{ ...S.wc, position: "relative" }}>
                    <button onClick={() => setShowWin(false)} style={{ position: "absolute", top: 12, right: 14, background: "none", border: "none", cursor: "pointer", color: "rgba(190,200,215,.4)", fontSize: 18, lineHeight: 1, padding: 4 }} className="cx">✕</button>
                    <svg width="52" height="52" viewBox="0 0 52 52" className="fl">
                      <circle cx="26" cy="26" r="24" fill="none" stroke="#0f6" strokeWidth="2.5" />
                      <path d="M15 26L22 33L37 19" fill="none" stroke="#0f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                    <h2 style={S.wt}>MAZE COMPLETE</h2>
                    <p style={S.ws}>LEVEL {levelIndex + 1}</p>
                    <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
                      {onNext
                        ? <>
                            <button onClick={onBack} style={{ ...S.wb, border: "1px solid rgba(255,45,85,.25)", background: "rgba(255,45,85,.08)", color: "#ff2d55" }} className="br">HOME</button>
                            <button onClick={onNext} style={S.wb} className="br">NEXT LEVEL →</button>
                          </>
                        : <button onClick={onBack} style={S.wb} className="br">HOME</button>
                      }
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const CSS = `
        @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&family=Jost:wght@300;400&display=swap');
        #root *{box-sizing:border-box}
        @keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ps{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.55;transform:scale(1.12)}}
        @keyframes po{0%,100%{opacity:.06}50%{opacity:.18}}
        .po{animation:po 2.2s ease-in-out infinite}
        @keyframes pl{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}
        @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes mp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
        .fu{animation:fu .7s cubic-bezier(.16,1,.3,1) both}
        .d1{animation-delay:.15s}.d2{animation-delay:.25s}.d3{animation-delay:.4s}.d4{animation-delay:.5s}
        .ps{animation:ps 3s ease-in-out infinite}
        .pl{animation:pl 1.4s ease-in-out infinite}
        .fl{animation:fl 3s ease-in-out infinite}
        .mp{animation:mp .2s ease-out both}
        .ch{transition:background .12s}
        .ch:hover{background:rgba(255,255,255,.05)!important}
        .ch:active{background:rgba(255,255,255,.09)!important}
        .br{transition:all .2s}
        .br:hover{background:rgba(255,255,255,.08)!important;border-color:rgba(255,255,255,.2)!important}
        .cx{transition:color .2s}
        .cx:hover{color:rgba(255,255,255,.9)!important;background:none!important;border-color:transparent!important}
        @keyframes retroShift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
        .retro-grad{background:linear-gradient(90deg,#39FF14,#00aaff,#ff2d55,#b44fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:retroShift 5s linear infinite}
        `;

        const S = {
          root: { minHeight: "100vh", background: "linear-gradient(168deg,#080a12 0%,#0c0f1c 50%,#0e1225 100%)", display: "flex", flexDirection: "column", alignItems: "center", padding: "28px 16px 40px", fontFamily: "'Oxanium',sans-serif", color: "#dde4ec", position: "relative" },
          head: { display: "flex", flexDirection: "column", alignItems: "center", gap: 10 },
          logoRow: { display: "flex", alignItems: "center", gap: 7 },
          title: { margin: 0, marginTop: 3, fontSize: 32, fontWeight: 700, letterSpacing: 7, color: "#e4ecf4", lineHeight: 1 },
          badge: { display: "flex", alignItems: "center", gap: 10, padding: "6px 20px", borderRadius: 20, background: "rgba(0,255,100,.05)", border: "1px solid rgba(0,255,100,.13)", fontSize: 13, color: "rgba(0,255,100,.85)", letterSpacing: 1 },
          badgeLbl: { fontSize: 13, fontWeight: 700, letterSpacing: 2, color: "rgba(0,255,100,.7)", fontFamily: "'IBM Plex Mono',monospace" },
          board: { position: "relative", background: "rgba(6,8,16,.55)", borderRadius: 14, padding: 10, border: "1px solid rgba(255,255,255,.05)", boxShadow: "0 24px 64px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03)", transition: "box-shadow .6s ease", marginTop: 18 },
          controls: { display: "flex", alignItems: "center", gap: 28, marginTop: 20 },
          stat: { display: "flex", flexDirection: "column", alignItems: "center", gap: 1, minWidth: 72 },
          statLbl: { fontSize: 9, fontWeight: 600, letterSpacing: 2.5, color: "rgba(190,200,215,.35)", fontFamily: "'IBM Plex Mono',monospace" },
          statVal: { fontSize: 22, fontWeight: 700 },
          btn: { display: "flex", alignItems: "center", padding: "10px 26px", borderRadius: 8, border: "1px solid rgba(255,255,255,.1)", background: "rgba(255,255,255,.03)", color: "rgba(190,200,215,.65)", fontSize: 11, fontWeight: 600, letterSpacing: 2.5, fontFamily: "'Oxanium',sans-serif", cursor: "pointer" },
          legend: { display: "flex", gap: 18, marginTop: 14, flexWrap: "wrap", justifyContent: "center" },
          li: { display: "flex", alignItems: "center", gap: 5, fontSize: 13, color: "rgba(190,200,215,.3)", letterSpacing: .4 },
          ld: { width: 7, height: 7, borderRadius: "50%", display: "inline-block" },
          ov: { position: "fixed", inset: 0, background: "rgba(4,6,12,.82)", backdropFilter: "blur(10px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
          wc: { display: "flex", flexDirection: "column", alignItems: "center", gap: 14, padding: "44px 60px", borderRadius: 18, background: "rgba(12,16,28,.95)", border: "1px solid rgba(0,255,100,.18)", boxShadow: "0 0 80px rgba(0,255,100,.08)" },
          wt: { margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: 5, color: "#0f6" },
          ws: { margin: 0, fontSize: 14, color: "rgba(190,200,215,.55)", fontWeight: 300 },
          wb: { marginTop: 6, padding: "11px 34px", borderRadius: 8, border: "1px solid rgba(0,255,100,.25)", background: "rgba(0,255,100,.08)", color: "#0f6", fontSize: 12, fontWeight: 600, letterSpacing: 2.5, fontFamily: "'Oxanium',sans-serif", cursor: "pointer" },
          backBtn: { alignSelf: "flex-start", background: "none", border: "none", color: "rgba(255,255,255,0.75)", fontFamily: "'Jost', sans-serif", fontWeight: 300, fontSize: "0.75rem", letterSpacing: "0.2em", textTransform: "uppercase", cursor: "pointer", marginBottom: 16, padding: 0, textDecoration: "none" },
        };

        function App() {
          const [screen, setScreen] = useState("home");
          const [levelIndex, setLevelIndex] = useState(0);
          const [maxUnlocked, setMaxUnlocked] = useState(() => Number(localStorage.getItem("mm_maxUnlocked") || 0));
          const [musicOn, setMusicOn] = useState(true);
          const audioRef = React.useRef(null);

          useEffect(() => {
            const audio = new Audio("Chillin-with-My-Puzzles_Looping.ogg");
            audio.loop = true;
            audio.volume = 0.5;
            audioRef.current = audio;
            audio.play().catch(() => {});
          }, []);

          const toggleMusic = useCallback(() => {
            if (musicOn) {
              if (audioRef.current) audioRef.current.pause();
              setMusicOn(false);
            } else {
              if (audioRef.current) audioRef.current.play().catch(() => {});
              setMusicOn(true);
            }
          }, [musicOn]);

          const goHome = () => setScreen("home");
          const goLevel = (idx) => { setLevelIndex(idx); setScreen("game"); };
          const handleComplete = () => setMaxUnlocked((prev) => {
            const next = Math.max(prev, levelIndex + 1);
            localStorage.setItem("mm_maxUnlocked", next);
            return next;
          });
          if (screen === "home") return <HomeScreen onPlay={goLevel} maxUnlocked={maxUnlocked} musicOn={musicOn} toggleMusic={toggleMusic} />;
          const hasNext = levelIndex < LEVELS.length - 1;
          return (
            <MirrorMaze
              key={levelIndex}
              onBack={goHome}
              onNext={hasNext ? () => goLevel(levelIndex + 1) : null}
              onComplete={handleComplete}
              levelIndex={levelIndex}
              musicOn={musicOn}
              toggleMusic={toggleMusic}
            />
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
<script src="report-bug-mirror.js"></script>
</body>
</html>
