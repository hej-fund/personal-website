<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Name</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hero">
    <div class="hero-content">
        <h1><span id="typed-name"></span></h1>

        <div class="buttons">
            <a href="about.html" class="btn">About</a>
            <a href="projects.html" class="btn">Projects</a>
            <a href="blog.html" class="btn">Blog</a>
            <a href="resume.pdf" class="btn" target="_blank">Resume</a>
        </div>
    </div>
</header>

<!-- Typewriter script -->
<script>
    const name = "Rohan Hejmadi"; // replace with your actual name
    const typedName = document.getElementById("typed-name");
    let i = 0;

    function typeWriter() {
        if (i < name.length) {
            typedName.textContent += name.charAt(i);
            i++;
            setTimeout(typeWriter, 150); // typing speed in ms
        } else {
            typedName.style.borderRight = "none"; // remove cursor after typing
        }
    }

    window.onload = typeWriter;
</script>

</body>
</html>
