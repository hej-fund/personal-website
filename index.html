<script>
    const name = "Rohan Hejmadi";
    const el = document.getElementById("typed-name");
    let i = 0;
    function type() {
        if (i < name.length) {
            el.textContent += name[i++];
            setTimeout(type, 90);
        } else {
            el.style.borderColor = "transparent";
            el.style.animation = "none";
        }
    }
    type();
</script>
