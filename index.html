<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml">
    <link rel="canonical" href="https://rohanhejmadi.com/">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<button class="btn-report">Report Bug</button>

<div class="hero">
    <div class="hero-content">
        <!-- Optional eyebrow: remove if not needed -->
        <p class="hero-eyebrow">Welcome</p>

        <h1 id="typed-name"></h1>

        <div class="buttons">
            <a href="about.html" class="btn">About</a>
            <a href="projects.html" class="btn">Projects</a>
            <a href="blog.html" class="btn">Blog</a>
            <a href="resume.pdf" target="_blank" class="btn">Resume</a>
        </div>
    </div>
</div>

<script>
    const name = "Rohan Hejmadi";
    const el = document.getElementById("typed-name");
    let i = 0;
    function type() {
        if (i < name.length) {
            el.textContent += name[i++];
            setTimeout(type, 90);
        } else {
            el.style.borderColor = "transparent";
            el.style.animation = "none";
        }
    }
    type();
</script>

<script src="report-bug.js"></script>
</body>
</html>
