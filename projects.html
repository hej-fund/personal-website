<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <style>
        .project-card--photo {
            position: relative;
            overflow: hidden;
            border-color: rgba(255,255,255,1);
            background: transparent;
            width: 460.79px;
            min-height: 166.27px;
        }

        .project-card-bg {
            position: absolute;
            inset: 0;
            background: url('william-thomas-ny6tO4ItOEY-unsplash.jpg') center/cover no-repeat;
            opacity: 0.8;
            z-index: 0;
        }

        .project-card--photo .project-label,
        .project-card--photo h2,
        .project-card--photo p,
        .project-card--photo .btn {
            position: relative;
            z-index: 2;
        }

        .project-card--photo p {
            color: rgba(255,255,255,0.95);
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .project-card--photo h2 {
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .project-card--photo .project-label {
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<button class="btn-report">Report Bug</button>

<div class="page-hero">
    <a href="index.html" class="back-btn">
        <span class="back-arrow">&#8592;</span>
        <span>Back</span>
    </a>

    <div class="page-content">
        <p class="eyebrow">Work</p>
        <h1>Projects</h1>
        <p class="subtitle">A collection of things I've built.</p>

        <div class="projects-grid">

            <div class="project-card project-card--photo">
                <div class="project-card-bg"></div>
                <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                    <p class="project-label">01</p>
                    <h2>Photography</h2>
                </div>
                <a href="photography.html" class="btn" style="margin-top: auto;">View</a>
            </div>

        </div>
    </div>
</div>

<script src="report-bug.js"></script>
</body>
</html>
