    <link rel="stylesheet" href="styles.css">
    <style>
        .project-card--photo {
            position: relative;
            overflow: hidden;
            border-color: rgba(255,255,255,1);
            background: transparent;
        }

        .project-card-bg {
            position: absolute;
            inset: 0;
            background: center/cover no-repeat;
            opacity: 1;
            z-index: 0;
        }

        .project-card--photo .project-card-bg {
            background-image: url('william-thomas-ny6tO4ItOEY-unsplash.jpg');
        }

        .project-card--photo .project-label,
        .project-card--photo h2,
        .project-card--photo p,
        .project-card--photo .btn {
            position: relative;
            z-index: 2;
        }

        .project-card--photo p {
            color: rgba(255,255,255,1);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .project-card--photo h2 {
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .project-card--photo .project-label {
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .project-card--games {
            position: relative;
            overflow: hidden;
            border-color: rgba(255,255,255,1);
            background: transparent;
        }

        .project-card--games .project-label,
        .project-card--games h2,
        .project-card--games .btn {
            position: relative;
            z-index: 2;
        }

        .project-card--games h2 {
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .project-card--games .project-label {
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            color: rgba(255, 255, 255, 1);
        }

        .project-card--games .project-card-bg {
            background-image: url('patrick-fOYg1lkZA7Y-unsplash.jpg');
            background-size: 180%;
        }

        .project-card--games:hover {
            border-color: rgba(255,255,255,1);
        }

    </style>
</head>
<body>

<button class="btn-report">Report Bug</button>

<div class="page-hero">
    <a href="/" class="back-btn">
        <span class="back-arrow">&#8592;</span>
        <span>Back</span>
    </a>

    <div class="page-content">
        <p class="eyebrow">Work</p>
        <h1>Projects</h1>
        <p class="subtitle">A collection of things I've built.</p>

        <div class="projects-grid">

            <div class="project-card project-card--photo">
                <div class="project-card-bg"></div>
                <p class="project-label" style="position: absolute; top: 1rem; right: 1rem; margin: 0; z-index: 2;">01</p>
                <h2>Photography</h2>
                <a href="photography.html" class="btn" style="margin-top: auto;">View</a>
            </div>

            <div class="project-card project-card--games">
                <div class="project-card-bg"></div>
                <p class="project-label" style="position: absolute; top: 1rem; right: 1rem; margin: 0; z-index: 2;">02</p>
                <h2>Games</h2>
                <a href="games.html" class="btn" style="margin-top: auto;">View</a>
            </div>

        </div>
    </div>
</div>

<script src="report-bug.js"></script>
</body>
</html>
