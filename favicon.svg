<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8614a"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b55c8"/>
      <stop offset="100%" style="stop-color:#6a3090"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <style>
    .monogram {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: 260px;
      dominant-baseline: middle;
      text-anchor: middle;
      letter-spacing: -10px;
    }
  </style>

  <g transform="translate(213.5 200) scale(1.1715) translate(-200 -200)" filter="url(#glow)">
    <text x="26%" y="189.0" class="monogram" fill="url(#rGrad)">R</text>
    <text x="64%" y="68%" class="monogram" fill="url(#hGrad)">H</text>
  </g>
</svg>
