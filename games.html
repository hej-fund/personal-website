    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400&family=Oxanium:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <style>
        .project-card--mirror {
            position: relative;
            overflow: hidden;
            border-color: rgba(255,255,255,1);
            background: #080c1e;
            box-shadow: inset 0 0 0 4px #080c1e, inset 0 0 0 6px rgba(255,255,255,0.35);
        }

        .project-card--mirror:hover {
            border-color: rgba(255,255,255,1);
        }

        @keyframes retroShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .project-card--mirror h2 {
            font-family: 'Oxanium', sans-serif;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: -10px;
            background: linear-gradient(90deg, #39FF14, #00aaff, #ff2d55, #b44fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: retroShift 5s linear infinite;
        }

        .project-card--mirror .btn {
            position: relative;
            z-index: 2;
            align-self: center;
            padding-top: 0.45rem;
            padding-bottom: 0.45rem;
        }

        .project-card--mirror svg:not(.mirror-maze-bg) {
            position: absolute;
            top: calc(50% - 10px);
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .mirror-maze-bg {
            position: absolute;
            inset: 5px;
            width: calc(100% - 10px);
            height: calc(100% - 10px);
            pointer-events: none;
            opacity: 0.32;
        }
    </style>
</head>

                <h2>Mirror Maze</h2>
                <a href="games/mirror_maze.html" target="_blank" class="btn" style="margin-top: auto; padding-left: 2.5rem; padding-right: 2.5rem;">Play!</a>

                    </g>

            </div>
